<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>时笠的博客</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
</head>
<body>

  <div class="wrap">
    <!-- Header -->
    <header class="site-header">
      <div class="site-title">时笠</div>
      <div class="site-tagline">代码 · 生活 · 碎碎念</div>
      <nav class="site-nav">
        <a href="index.html">博客</a>
        <a href="category.html?tag=tech">技术</a>
        <a href="category.html?tag=life">生活</a>
        <a href="index.html#about">关于</a>
      </nav>
    </header>

    <!-- Post -->
    <article>
      <div class="post-header">
        <div class="post-title" id="postTitle">加载中…</div>
        <div class="post-meta">
          <span id="postDate"></span>
          <span class="tag" id="postTag"></span>
        </div>
      </div>
      <div class="post-preview-image" id="postPreviewImage" style="display:none;margin:20px 0;border-radius:8px;overflow:hidden;">
        <img id="previewImage" src="" alt="预览图" style="width:100%;max-height:400px;object-fit:cover;">
      </div>
      <div class="post-body" id="postBody">
        <p style="color:var(--text-dim)">正在加载文章…</p>
      </div>
    </article>

    <a class="back-link" href="index.html">← 回到首页</a>
  </div>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="footer-links">
      <a href="https://github.com" target="_blank">GitHub</a>
      <a href="mailto:shi.li@example.com">Email</a>
    </div>
    <div>© 2026 时笠 · 用 ❤️ 和 HTML 搭建</div>
  </footer>

  <!-- Marked.js: Markdown 渲染 -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <!-- highlight.js: 代码高亮 -->
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/core.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/languages/javascript.min.js"></script>
  <script>
    // ---- 文章路由 ----
    // URL: post.html?file=hello-world
    const params = new URLSearchParams(window.location.search);
    const file = params.get("file");

    if (!file) {
      document.getElementById("postBody").innerHTML =
        "<p style='color:var(--text-dim)'>没有指定文章。</p>";
    } else {
      // 从 posts.json 加载文章（内容已内嵌，无需单独请求 .md 文件）
      fetch(`posts.json?t=${Date.now()}`)
        .then(res => {
          if (!res.ok) throw new Error("posts.json 加载失败");
          return res.json();
        })
        .then(posts => {
          const post = posts.find(p => p.id === file);
          if (!post) throw new Error("文章不存在");

          // 填充标题、日期、标签
          document.getElementById("postTitle").textContent = post.title;
          document.title = post.title + " — 时笠的博客";
          document.getElementById("postDate").textContent = post.date;

          const tagEl = document.getElementById("postTag");
          const tagLabel = post.tag === "tech" ? "技术" : "生活";
          tagEl.textContent = tagLabel;
          tagEl.className = "tag tag--" + post.tag;

          // 显示预览图
          if (post.previewImage) {
            document.getElementById("previewImage").src = post.previewImage;
            document.getElementById("postPreviewImage").style.display = "block";
          }

          // 渲染 Markdown 内容
          marked.setOptions({
            highlight: function (code, lang) {
              if (lang && hljs.getLanguage(lang)) {
                return hljs.highlight(code, { language: lang }).value;
              }
              return code;
            },
            breaks: true,
            gfm: true
          });

          document.getElementById("postBody").innerHTML = marked.parse(post.content);
          // 代码块高亮
          document.querySelectorAll("pre code").forEach(block => {
            hljs.highlightBlock(block);
          });
        })
        .catch(err => {
          document.getElementById("postTitle").textContent = "404";
          document.getElementById("postBody").innerHTML =
            `<p style="color:var(--text-dim)">文章加载失败：「${file}」不存在。<br><br><a href="index.html" style="color:var(--accent)">← 回到首页</a></p>`;
        });
    }
  </script>
</body>
</html>
