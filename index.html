<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>时笠 — 代码 · 生活 · 碎碎念</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ===== Navigation Bar ===== -->
  <header class="site-header">
    <a href="index.html" class="site-logo">
      <span class="site-logo-dot"></span>
      <span class="site-logo-text">时笠</span>
    </a>
    <nav class="site-nav">
      <a href="index.html" class="active">文章</a>
      <a href="category.html?tag=tech">技术</a>
      <a href="category.html?tag=life">生活</a>
      <a href="index.html#about">关于</a>
    </nav>
  </header>

  <div class="wrap">

    <!-- ===== Hero Section ===== -->
    <section class="hero">
      <div class="hero-tag">
        <span class="hero-tag-line"></span>
        <span class="hero-tag-text">个人博客 · 技术与思考</span>
      </div>
      <h1 class="hero-title">
        <span class="hero-title-line hero-title-line--primary">EXPLORING</span>
        <span class="hero-title-line hero-title-line--faded">IDEAS &amp;</span>
        <span class="hero-title-line hero-title-line--accent">CODE.</span>
      </h1>
      <p class="hero-sub">记录生活中的技术探索、读书笔记与日常感想。</p>
      <div class="hero-cta">
        <a href="#posts" class="cta-primary">阅读文章</a>
        <a href="#about" class="cta-secondary">了解我 →</a>
      </div>
    </section>

    <!-- ===== Articles Section ===== -->
    <section id="posts">
      <div class="section-header">
        <h2 class="section-title">最新文章</h2>
        <a href="category.html" class="section-link">全部文章 →</a>
      </div>
      <div class="section-divider"></div>

      <!-- Tag Filter Bar -->
      <div class="filter-bar" id="filterBar">
        <button class="filter-btn active" data-tag="all">全部</button>
        <button class="filter-btn" data-tag="tech">技术</button>
        <button class="filter-btn" data-tag="life">生活</button>
      </div>

      <!-- Search Bar -->
      <div class="search-bar" id="searchBar">
        <input type="text" id="searchInput" placeholder="搜索文章标题或内容..." autocomplete="off">
        <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18">
          <circle cx="11" cy="11" r="8" fill="none" stroke="currentColor" stroke-width="2"/>
          <line x1="16" y1="16" x2="22" y2="22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <button class="search-clear" id="searchClear" title="清除搜索">&times;</button>
      </div>

      <!-- Post List (rendered by script.js) -->
      <div class="post-list" id="postList"></div>

      <!-- Pagination (rendered by script.js) -->
      <div class="pagination" id="pagination"></div>
    </section>

    <!-- ===== Featured Article ===== -->
    <section class="featured-section">
      <div class="featured-label">精选文章</div>
      <div class="featured-card" id="featuredCard" style="display:none;">
        <div class="featured-card-left">
          <div>
            <div class="featured-tag">FEATURED</div>
            <h3 class="featured-title" id="featuredTitle"></h3>
          </div>
          <div class="featured-meta">
            <span class="featured-date" id="featuredDate"></span>
            <a class="featured-link" id="featuredLink" href="#">阅读全文 →</a>
          </div>
        </div>
        <div class="featured-card-right"></div>
      </div>
    </section>

    <!-- ===== About Section ===== -->
    <section class="about-section" id="about">
      <div class="about-label">关于我</div>
      <div class="about-content">
        <h2 class="about-name">时笠</h2>
        <p class="about-bio">
          一个辗转走过多个城市、读过许多书的工程师。我相信简单有力：用最少的代码、最清晰的表达讲需要认真说的事。
        </p>
        <div class="about-links">
          <a href="https://github.com" target="_blank" rel="noopener">GitHub ↗</a>
          <a href="#">RSS ↗</a>
          <a href="mailto:shi.li@example.com">Email ↗</a>
        </div>
      </div>
    </section>

  </div>

  <!-- ===== Footer ===== -->
  <footer class="site-footer">
    <span>© 2026 时笠. 保留所有权利。</span>
    <span>Crafted with ♥ & GitHub Pages</span>
  </footer>

  <script src="script.js"></script>
</body>
</html>
